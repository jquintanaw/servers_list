services:
  db:
    image: postgres:16-alpine
    container_name: postgres_server
    restart: always
    environment:
      POSTGRES_USER: server
      POSTGRES_PASSWORD: password
      POSTGRES_DB: servers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U server -d servers"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loginweb_php
    restart: always
    volumes:
      - ..:/var/www
    environment:
      DATABASE_URL: postgresql://server:password@db:5432/servers
      APP_ENV: dev
      APP_DEBUG: "1"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: loginweb_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    depends_on:
      - php

volumes:
  postgres_data:
    driver: local

networks:
  backend:
    driver: bridge