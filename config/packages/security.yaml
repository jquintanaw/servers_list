security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api_login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api/
            stateless: true
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: /login
                check_path: /login_check
                enable_csrf: true
                default_target_path: app_servers
            logout:
                path: app_logout
                target: app_login
            login_throttling:
                max_attempts: 5
                interval: '1 minute'

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/operating-systems/[0-9]+/versions, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/mi-perfil, roles: ROLE_USER }
        - { path: ^/mi-perfil/datos, roles: ROLE_USER }
        - { path: ^/mi-perfil/avatar, roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api/servers, roles: PUBLIC_ACCESS }
        - { path: ^/api/tags, roles: PUBLIC_ACCESS }
        - { path: ^/api/operating-systems, roles: PUBLIC_ACCESS }
        - { path: ^/servers, roles: ROLE_USER }

    role_hierarchy:
        ROLE_API: [ROLE_USER, ROLE_API_GET, ROLE_API_POST, ROLE_API_PUT, ROLE_API_DELETE]
        ROLE_API_GET: ROLE_USER
        ROLE_API_POST: ROLE_USER
        ROLE_API_PUT: ROLE_USER
        ROLE_API_DELETE: ROLE_USER
        ROLE_SERVICE_ADMIN: ROLE_USER
        ROLE_ADMIN: [ROLE_USER, ROLE_SERVICE_ADMIN]

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
